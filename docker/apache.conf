<VirtualHost *:80>
  ServerName localhost
  DocumentRoot /var/www/public
  DirectoryIndex index.php

  <Directory /var/www/public>
    AllowOverride All
    Require all granted
    FallbackResource /index.php
  </Directory>

  # --- Proxy Vite (AUCUN CORS) ---
  ProxyPreserveHost On
  RewriteEngine On

  # WebSocket HMR
  RewriteCond %{REQUEST_URI} ^/@vite [OR]
  RewriteCond %{REQUEST_URI} ^/sockjs-node [OR]
  RewriteCond %{REQUEST_URI} ^/ws
  RewriteCond %{HTTP:Upgrade} =websocket [NC]
  RewriteRule ^/(.*)$ ws://vite:3000/$1 [P,L]

  # Sources / modules / build (dev)
  ProxyPass        /@vite          http://vite:3000/@vite
  ProxyPassReverse /@vite          http://vite:3000/@vite
  ProxyPass        /src/           http://vite:3000/src/
  ProxyPassReverse /src/           http://vite:3000/src/
  ProxyPass        /node_modules/  http://vite:3000/node_modules/
  ProxyPassReverse /node_modules/  http://vite:3000/node_modules/
  ProxyPass        /build/         http://vite:3000/build/
  ProxyPassReverse /build/         http://vite:3000/build/


  <LocationMatch "^/\.(env|git|hg|svn|docker|ht|vscode)">
    Require all denied
  </LocationMatch>

  ErrorLog  /var/log/apache2/dev-error.log
  CustomLog /var/log/apache2/dev-access.log combined
</VirtualHost>
