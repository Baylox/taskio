services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/apache.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      - DATABASE_URL=mysql://app:!ChangeMe!@database:3306/app
    depends_on:
      - database
    command: >
      bash -lc "a2enmod proxy proxy_http proxy_wstunnel headers rewrite &&
                apache2-foreground"

  # Service for Vite and hot reload
  vite:
    build:
      context: .
      dockerfile: ./docker/vite/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_HOST=0.0.0.0
      - VITE_HMR_HOST=localhost
  # Service for Vite and hot reload
  mercure:
    image: dunglas/mercure
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: '!ChangeMe!'
      MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeMe!'
    ports:
      - "3001:80"

###> doctrine/doctrine-bundle ###
  database:
    # Official MariaDB image (latest stable version)
    image: mariadb:${MARIADB_VERSION:-11.4}

    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-!ChangeMe!}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-!ChangeMe!}

    # Healthcheck: waits for MariaDB to respond
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MARIADB_USER:-app}", "-p${MARIADB_PASSWORD:-!ChangeMe!}"]
      timeout: 5s
      retries: 5
      start_period: 30s

    volumes:
      - database_data:/var/lib/mysql:rw
###< doctrine/doctrine-bundle ###


###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###> symfony/mailer ###

volumes:
###> doctrine/doctrine-bundle ###
  # Persistent volume for MariaDB database
  database_data:
###< doctrine/doctrine-bundle ###

###> symfony/mercure-bundle ###
  mercure_data:
  mercure_config:
###< symfony/mercure-bundle ###

